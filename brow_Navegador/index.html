<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo pratico</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        padding: 10px;
    }
    .container{
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
    }
    #caixa1, #caixa2{
        width: 100px;
        height: 50px;
        background-color: #d2ad;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius:5px;
        cursor: grab;
    }
    #caixagrande{
        width: 400px;
        height: 250px;
        border: 2px dashed #ccc;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px;
    }
    .destaque{
        background-color: rgb(38, 136, 136);
    }
</style>
<body>

    <div class="container">
        <div draggable="true" class='caixa' id="caixa1">HTML</div>
        <div draggable="true" class="caixa" id="caixa2">JavaScript</div>

        <div id="caixagrande"></div>
    </div>
    
    <script>
        const elemento = document.querySelectorAll('.container .caixa')
        const inserir =  document.getElementById('caixagrande')
        
        elemento.forEach(function(el){
            el.addEventListener('dragstart', function(event){
                const seletor = '#' + event.target.id
                event.dataTransfer.setData('text/plain', seletor)
                event.dataTransfer.effectAllowed = 'copyMove'
            })
        })

        inserir.addEventListener('dragover', function(event){
            event.preventDefault();
            event.dataTransfer.dropEffect = 'copy'
            inserir.classList.add('destaque')
        })

        inserir.addEventListener('dragleave', ()=>{
            inserir.classList.remove('destaque')
        })

        inserir.addEventListener('drop', function(event){
            event.preventDefault()
            const seletor = event.dataTransfer.getData('text/plain')
            const eleEncontrado = document.querySelector(seletor)
            inserir.appendChild(eleEncontrado)
            inserir.classList.remove('destaque')
        })


    </script>
</body>
</html>
